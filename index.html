<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Graphics Portfolio | Client Portal</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #111424 0%, #060814 100%); 
            margin: 0; 
            color: #ffffff;
        }
        .portfolio-box { 
            background: #1a1f36; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 320px; 
            text-align: center; 
            border-top: 4px solid #ff4757; /* স্পোর্টস ভাইব্রেন্ট রেড কালার */
        }
        h2 { margin-bottom: 5px; color: #ffffff; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #a4b0be; font-size: 14px; margin-bottom: 25px; }
        input[type="text"] { 
            width: 92%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #2f3542; 
            border-radius: 6px; 
            background: #0f1224; 
            color: #fff;
            font-size: 14px;
        }
        input[type="text"]:focus { border-color: #ff4757; outline: none; }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #ff4757; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }
        button:hover { background-color: #e84118; }
    </style>
</head>
<body>
    <div class="portfolio-box">
        <h2>🔥 PRO SPORTS GRAPHICS</h2>
        <p>Enter details to unlock exclusive HD design concepts</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Client Name / Email" required>
            <br>
            <input type="text" name="token" placeholder="Access Pass-Token" required>
            <br><br>
            <button type="submit">Unlock Portfolio</button>
        </form>
    </div>
</body>
</html>
